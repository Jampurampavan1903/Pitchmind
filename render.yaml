services:
  # FastAPI Backend Web Service
  - type: web
    name: pitchmind-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pitchmind-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: PITCHMIND_OTP_BYPASS_ENABLED
        value: "True"
      - key: CORS_ORIGINS
        value: https://pitchmind-one.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: PITCHMIND_STORAGE_DIR
        value: ../storage

databases:
  # Managed PostgreSQL Database
  - name: pitchmind-postgres
    plan: free
