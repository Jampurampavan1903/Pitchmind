services:
  # FastAPI Backend Web Service
  - type: web
    name: pitchmind-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pitchmind-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: PITCHMIND_OTP_BYPASS_ENABLED
        value: "False"
      - key: LOG_LEVEL
        value: INFO

databases:
  # Managed PostgreSQL Database
  - name: pitchmind-postgres
    plan: free
