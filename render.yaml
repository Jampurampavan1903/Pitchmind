services:
  # FastAPI Backend Web Service
  - type: web
    name: pitchmind-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: backend
    plan: free
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pitchmind-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: PITCHMIND_OTP_BYPASS_ENABLED
        value: "False"
      - key: LOG_LEVEL
        value: INFO

databases:
  # Managed PostgreSQL Database
  - name: pitchmind-postgres
    plan: free
    postgresVersion: 15
