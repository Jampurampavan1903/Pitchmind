version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pitchmind_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pitchmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pitchmind_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-pitchmind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pitchmind_backend
    restart: always
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-pitchmind}:${POSTGRES_PASSWORD:-pitchmind_secure_pass}@postgres:5432/${POSTGRES_DB:-pitchmind}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-e82f7c0a96f1b3e1509930fca56cb59e557b77ab92ef3d81b4d0ad4b784a0d93}
      - JWT_EXPIRY_DAYS=7
      - LOG_LEVEL=INFO
      - PITCHMIND_OTP_BYPASS_ENABLED=True
      - PITCHMIND_OTP_METHOD=auto
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: pitchmind_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
